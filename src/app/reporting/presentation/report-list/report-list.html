<div class="container">

  <div class="header">
    <h1>Reports</h1>

    <button (click)="createReport()">
      Create Report
    </button>
  </div>

  <table>
    <thead>
    <tr>
      <th>ID</th>
      <th>Title</th>
      <th>Type</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr *ngFor="let report of reports">

      <td>{{ report.id }}</td>
      <td>{{ report.title }}</td>
      <td>{{ report.type }}</td>
      <td>{{ report.status }}</td>

      <td>
        <button (click)="goToDetail(report.id)">
          View
        </button>

        <button (click)="deleteReport(report.id)">
          Delete
        </button>
      </td>

    </tr>
    </tbody>
  </table>

</div>
