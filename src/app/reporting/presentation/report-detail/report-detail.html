<div class="container" *ngIf="report">

  <h1>Report Detail</h1>

  <div class="form-group">
    <label>Title</label>
    <input [(ngModel)]="report.title">
  </div>

  <div class="form-group">
    <label>Type</label>
    <input [(ngModel)]="report.type">
  </div>

  <div class="form-group">
    <label>Status</label>
    <input [(ngModel)]="report.status">
  </div>

  <div class="form-group">
    <label>Summary</label>
    <textarea [(ngModel)]="report.summary"></textarea>
  </div>

  <button (click)="saveChanges()">
    Save
  </button>

  <button (click)="goBack()">
    Back
  </button>

</div>
