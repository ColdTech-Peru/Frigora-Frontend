<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header class="auth-header">
      <mat-card-title>{{ 'auth.login.title' | translate }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">

        <div *ngIf="(authStore.errors$ | async) as errors">
          <div *ngIf="errors.length > 0" class="error-container">
            <div *ngFor="let error of errors" class="error-message">
              <mat-icon>error_outline</mat-icon>
              <span>{{ error.message }}</span>
            </div>
          </div>
        </div>

        <mat-form-field appearance="outline">
          <mat-label>{{ 'auth.login.username' | translate }}</mat-label>
          <input matInput formControlName="username" type="text" required />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>{{ 'auth.login.password' | translate }}</mat-label>
          <input matInput formControlName="password" type="password" required />
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit" class="submit-button" [disabled]="loginForm.invalid || loading">
          <span *ngIf="!loading">{{ 'auth.login.cta' | translate }}</span>
          <mat-spinner *ngIf="loading" diameter="24"></mat-spinner>
        </button>

        <div class="auth-links">
          <a routerLink="/auth/register">{{ 'auth.register.alreadyHaveAccount' | translate }}</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
