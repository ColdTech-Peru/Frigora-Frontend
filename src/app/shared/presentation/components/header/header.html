<!-- header.html -->
<header class="topbar">
  <div class="brand" (click)="goToDashboard()" role="button" aria-label="Go to dashboard">
    <mat-icon>ac_unit</mat-icon>
    <span>{{ appName }}</span>
  </div>

  <div class="spacer"></div>

  <div class="actions">
    <app-language-switcher />

    <mat-divider vertical class="divider" />

    @if (authStore.isLoggedIn && authStore.currentUser) {
      <span class="user-role">({{ authStore.currentUser.role }})</span>
      <span class="user-email">{{ authStore.currentUser.email }}</span>

      <button
        mat-icon-button
        color="warn"
        (click)="handleSignOut()"
        matTooltip="Logout"
        aria-label="Logout">
        <mat-icon>power_settings_new</mat-icon>
      </button>
    }
  </div>
</header>
